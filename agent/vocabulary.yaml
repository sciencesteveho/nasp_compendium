drift:
  CCF_formation:
    replacement: cytoplasmic_chromatin_fragments
    reason: CCF biology should use the canonical cytoplasmic chromatin fragment node.
  chromatin_accessibility:
    replacement: epigenetic_remodeling
    reason: Accessibility gain and transposon methylation loss should be captured as epigenetic remodeling, with locus details in context.
  cytosolic_L1_cDNA_accumulation:
    replacement: cytoplasmic_retroelement_cDNA
    reason: L1 cDNA accumulation should use the canonical cytoplasmic retroelement cDNA node.
  L1_de-repression:
    replacement: retrotransposon_derepression
    reason: L1 derepression should use the canonical retrotransposon derepression node.
