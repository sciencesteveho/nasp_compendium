name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install package
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

      - name: Test
        run: pytest

      - name: Validate compendium
        run: compendium validate --dir docs/compendium

      - name: Render graph
        run: |
          mkdir -p .ci-artifacts
          compendium render_graph \
            --directory docs/compendium \
            --annotate-papers \
            --out .ci-artifacts/nasp_pathway_map.svg

      - name: Upload graph artifact
        uses: actions/upload-artifact@v7
        with:
          name: nasp-pathway-map-svg
          path: .ci-artifacts/nasp_pathway_map.svg
          if-no-files-found: error
